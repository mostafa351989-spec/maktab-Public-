<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>لوحة التحكم</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-100 p-4"><div class="max-w-4xl mx-auto"><h1 class="text-3xl font-bold mb-6 text-center">لوحة التحكم - مكتب الدلتا</h1><div class="flex gap-2 mb-6 bg-white p-2 rounded shadow"><button onclick="tab('add')" id="btn-add" class="flex-1 py-2 bg-blue-600 text-white rounded">إضافة شحنة</button><button onclick="tab('reports')" id="btn-reports" class="flex-1 py-2 bg-gray-200 rounded">التقارير</button><button onclick="tab('settings')" id="btn-settings" class="flex-1 py-2 bg-gray-200 rounded">إعدادات التطبيق</button></div><div id="add" class="bg-white p-6 rounded shadow"><h2 class="text-xl font-bold mb-4">إضافة شحنة جديدة</h2><p>هنا فورم الشحنة...</p></div><div id="reports" class="bg-white p-6 rounded shadow hidden"><h2 class="text-xl font-bold mb-4">التقارير</h2><p>هنا التقارير...</p></div><div id="settings" class="bg-white p-6 rounded shadow hidden"><h2 class="text-xl font-bold mb-4">إعدادات التطبيق</h2><div class="space-y-4"><div><label class="block mb-1 font-bold">اسم المكتب</label><input id="office" type="text" class="w-full border p-2 rounded" value="مكتب الدلتا"></div><div><label class="block mb-1 font-bold">رقم الواتساب</label><input id="phone" type="text" class="w-full border p-2 rounded" value="+201234567890"></div><button onclick="save()" class="bg-green-600 text-white px-6 py-2 rounded">حفظ الإعدادات</button><p id="msg" class="text-green-600 mt-2 hidden">تم الحفظ بنجاح!</p></div></div><script>function tab(t){['add','reports','settings'].forEach(x=>{document.getElementById(x).classList.add('hidden');document.getElementById('btn-'+x).className='flex-1 py-2 bg-gray-200 rounded'});document.getElementById(t).classList.remove('hidden');document.getElementById('btn-'+t).className='flex-1 py-2 bg-blue-600 text-white rounded'}function save(){localStorage.setItem('office',office.value);localStorage.setItem('phone',phone.value);msg.classList.remove('hidden');setTimeout(()=>msg.classList.add('hidden'),2000)}tab('add')</script></body></html>
